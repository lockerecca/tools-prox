# ============================================================
# Servicio: Apertura RDP (gate OIDC -> nft)
# Sirve PHP LOCAL en el propio .31.3. NO proxia a ningun backend.
# Autenticacion: Google OAuth (mismo cliente que login/mcadmin)
# ============================================================
<VirtualHost *:80>
    ServerName rdp.forseti.es
    Redirect permanent / https://rdp.forseti.es/

    Alias /.well-known/acme-challenge /var/www/.well-known/acme-challenge
    <Directory /var/www/.well-known/acme-challenge>
        Require all granted
    </Directory>
</VirtualHost>

<VirtualHost *:443>
    ServerName rdp.forseti.es

    Include /etc/apache2/conf-available/ssl-forseti.conf
    Include /etc/apache2/conf-available/security-headers.conf
    Include /etc/apache2/conf-available/oidc-base.conf
    # OJO: NO incluir proxy-common.conf ni ProxyPass. Esto sirve PHP local.

    OIDCRedirectURI https://rdp.forseti.es/oidc/callback

    DocumentRoot /var/www/rdp
    DirectoryIndex open.php

    ErrorLog ${APACHE_LOG_DIR}/rdp-error.log
    CustomLog ${APACHE_LOG_DIR}/rdp-access.log combined

    <Location />
        AuthType openid-connect
        Include /etc/apache2/conf-available/oidc-users.conf
    </Location>

    <Directory /var/www/rdp>
        Require all granted
    </Directory>
</VirtualHost>
